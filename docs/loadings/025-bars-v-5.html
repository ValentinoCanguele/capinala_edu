<style>

:root{
  --size:64px;
  --accent:#2563EB;    /* azul */
  --accent2:#10B981;   /* verde */

*{box-sizing:border-box}
body{font-family:ui-sans-serif,system-ui,Segoe UI,Roboto,Ubuntu; margin:0; background:linear-gradient(180deg,#f8fafc,#eef2ff 40%,#f5f3ff)}
.header{padding:28px 16px 8px;text-align:center}
.header h1{margin:0;font-size:clamp(20px,2.6vw,34px)}
.header p{margin:.25rem 0 0;color:#334155}
.toolbar{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; padding:8px 12px 18px}
.toolbar button{border:none;background:white;padding:10px 14px;border-radius:999px;box-shadow:0 6px 18px rgba(2,6,23,.08);cursor:pointer;font-weight:600}
.toolbar button.active{outline:3px solid #c7d2fe}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; padding:16px; max-width:1200px; margin:0 auto 28px}
.card{background:white;border-radius:16px;padding:14px;box-shadow:0 10px 30px rgba(2,6,23,.06),0 2px 8px rgba(2,6,23,.04);display:flex;flex-direction:column;align-items:center;justify-content:center}
.title{margin-top:10px;font-size:14px;color:#475569;text-align:center}
.cat{font-size:11px;color:#64748b;margin-top:2px}
.loader{width:var(--size);height:var(--size);position:relative;display:grid;place-items:center}
.loader span{display:block}
.hide{display:none!important}

/* Keyframes */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes grow{0%,100%{height:20%}50%{height:85%}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes fillx{0%{width:0%}60%{width:85%}100%{width:0%}}
@keyframes filly{0%{height:0%}60%{height:85%}100%{height:0%}}
@keyframes pie{0%{--p:0deg}50%{--p:280deg}100%{--p:0deg}}
@keyframes dash{0%{stroke-dashoffset:100}60%{stroke-dashoffset:0}100%{stroke-dashoffset:100}}
@keyframes pulse{0%,100%{transform:scale(.9);opacity:.8}50%{transform:scale(1.1);opacity:1}}
@keyframes slide{0%{transform:translateX(-5%)}100%{transform:translateX(165%)}}
@keyframes rain{0%{transform:translateY(0);opacity:1}100%{transform:translateY(12px);opacity:0}}
@keyframes swing{0%{transform:rotate(-18deg)}50%{transform:rotate(18deg)}100%{transform:rotate(-18deg)}}
@keyframes eq{0%,100%{height:12%}50%{height:90%}}
@keyframes twinkle{0%,100%{opacity:.3;transform:scale(.9) rotate(45deg)}50%{opacity:1;transform:scale(1.15) rotate(45deg)}}

/* 4) Progress bars (with icons zones) */
.progress-track{width:140px;height:12px;border-radius:999px;background:var(--muted);overflow:hidden;position:relative}
.progress-track .bar{height:100%;background:linear-gradient(90deg,var(--accent),#60a5fa);width:0;animation:fillx 1.6s ease-in-out infinite}
.progress-striped .bar{background:repeating-linear-gradient(45deg,var(--accent) 0 10px,#60a5fa 10px 20px)}
.progress-glow .bar{box-shadow:0 0 20px rgba(37,99,235,.6) inset}
.progress-dashed .bar{background:repeating-linear-gradient(90deg,var(--accent) 0 8px,transparent 8px 16px)}
.progress-pulse .bar{animation:fillx 1.2s ease-in-out infinite, pulse 1.2s ease-in-out infinite}
.progress-helical .bar{background:repeating-linear-gradient(135deg,var(--accent) 0 6px,transparent 6px 12px)}
.progress-led .bar{background:linear-gradient(90deg,#93c5fd 0,#2563eb 40%,#1e40af 70%,#93c5fd 100%)}
.progress-smooth .bar{background:linear-gradient(90deg,#60a5fa,#2563eb);filter:contrast(110%)}
.progress-success .bar{background:linear-gradient(90deg,var(--accent2),#34d399)}
.progress-warning .bar{background:linear-gradient(90deg,var(--accent3),#f59e0b)}

/* 5) Radial pie progress */
.pie{border-radius:50%;background:conic-gradient(var(--accent) 0 var(--p,0deg), #e5e7eb 0);animation:pie 1.6s ease-in-out infinite}
.ring{border-radius:50%;background:conic-gradient(var(--accent) 0 var(--p,0deg), transparent 0); -webkit-mask:radial-gradient(farthest-side,#0000 calc(100% - 10px),#000 0); mask:radial-gradient(farthest-side,#0000 calc(100% - 10px),#000 0); animation:pie 1.6s ease-in-out infinite}

/* 6) Skeletons */
.skel-card{width:160px;height:100px;border-radius:12px;overflow:hidden;background:#e5e7eb;position:relative}
.skel-card::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,#e5e7eb,#f3f4f6,#e5e7eb);animation:shimmer 1.2s linear infinite}
.skel-line{width:140px;height:12px;border-radius:8px;background:#e5e7eb;position:relative;overflow:hidden}
.skel-line::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,#e5e7eb,#f3f4f6,#e5e7eb);animation:shimmer 1.2s linear infinite}

/* 7) EQ */
.eq{display:flex;gap:6px;align-items:flex-end;width:auto;height:var(--size)}
.eq span{width:8px;background:var(--accent);border-radius:6px;height:20%;animation:eq 1s ease-in-out infinite}
.eq span:nth-child(2){animation-delay:.05s}
.eq span:nth-child(3){animation-delay:.1s}
.eq span:nth-child(4){animation-delay:.15s}
.eq span:nth-child(5){animation-delay:.2s}

/* 8) Stars twinkle (for GPA/Notas glows) */
.twinkle{width:64px;height:64px;position:relative}
.twinkle span{position:absolute;width:6px;height:6px;background:var(--accent2);transform:rotate(45deg);animation:twinkle 1.2s infinite}
.twinkle span:nth-child(1){top:10px;left:10px}
.twinkle span:nth-child(2){top:26px;left:34px;animation-delay:.2s}
.twinkle span:nth-child(3){top:40px;left:18px;animation-delay:.4s}

/* 9) Timeline steps */
.timeline{width:160px;display:flex;gap:10px;align-items:center}
.timeline .dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
.timeline .line{flex:1;height:4px;background:linear-gradient(90deg,var(--accent) 0,#93c5fd);animation:fillx 1.4s linear infinite}

/* 10) Semicircle gauge */
.gauge{width:120px;height:60px;border-radius:120px 120px 0 0;overflow:hidden;background:#e5e7eb;position:relative}
.gauge::before{content:"";position:absolute;inset:0;background:conic-gradient(from 180deg,var(--accent) 0 var(--p,0deg), transparent 0);transform-origin:bottom center;animation:pie 1.6s ease-in-out infinite}
.gauge::after{content:"";position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:8px;height:20px;background:#111827;border-radius:999px}

/* 11) Simple rains for attendance */
.rain{width:80px;height:56px;position:relative;background:radial-gradient(circle at 30% 40%, #e5e7eb 20px, transparent 21px) no-repeat 10px 6px/60px 30px}
.rain span{position:absolute;top:34px;width:2px;height:12px;background:var(--accent);border-radius:2px;animation:rain .8s linear infinite}
.rain span:nth-child(1){left:20px}
.rain span:nth-child(2){left:38px;animation-delay:.15s}
.rain span:nth-child(3){left:56px;animation-delay:.3s}

/* 12) SVG stroke animation general */
.svg-stroke svg{width:var(--size);height:var(--size)}
.svg-stroke path, .svg-stroke circle, .svg-stroke polyline{fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:100;stroke-dashoffset:100;animation:dash 2s ease-in-out infinite}
.svg-stroke .ok{stroke:var(--accent2)}
.svg-stroke .warn{stroke:var(--accent3)}
